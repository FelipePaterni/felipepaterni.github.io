<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Meta tags Obrigatórias -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <title>Rob.exe</title>
</head>

<body>
    <div class="card bg-dark text-white ">
        <img class="card-img img-fluid" style="height: 800px;" src="R3.jpg" alt="Imagem do card">
        <div class="card-img-overlay ">
            <div class="row card-text">        

            <div class="row">
                <div class="col-sm-10">
                    <div class="alert alert-success mt-3" id="resultadoAlert" style="display: none;">
                        <strong>Resultado: </strong> <a id="link" href="#"> Execute:</a><span id="resultadoTexto"></span>
                    </div>

                    <form>
                        <div class="form-group">
                            <label for="textoInput">Digite algo:</label>
                            <input type="text" class="form-control" id="textoInput" placeholder="Digite aqui">
                            <input type="button" class="btn btn-dark" value="Enviar" onclick="executarComando()">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript (Opcional) -->
    <!-- jQuery primeiro, depois Popper.js, depois Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

    <script>
        function executarComando() {
            var texto = document.getElementById("textoInput").value;
            var resultado = "";
            var link = document.getElementById("link");
            var minhaUrl = "";

            switch (texto.toLowerCase()) {
                case "!criptografia":
                resultado = "Iniciando pesquisa... ";
                var minhaUrl = "https://felipepaterni.github.io/docs/G_I_N_I/";
                link.href = minhaUrl;
                    break;
                    case "links":
                    resultado = "https://web.whatsapp.com/";
                    break;
                    case "links":
                    resultado = "https://web.whatsapp.com/";
                    break;
                // Adicione mais cases para outros comandos e resultados aqui
                default:
                    resultado = "Comando não reconhecido.";
            }

            document.getElementById("resultadoTexto").textContent = resultado;
            document.getElementById("resultadoAlert").style.display = "block";
        }
    </script>
</body>

</html>
